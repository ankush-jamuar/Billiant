<!DOCTYPE html>
<html>
<body style="background:#f5f7fa;padding:30px;font-family:Arial">

<div style="max-width:600px;background:#fff;margin:auto;padding:30px;border-radius:8px">

<h2>Invoice {{invoiceNumber}}</h2>

<p>Hello {{clientName}},</p>

<p>
You’ve received a new invoice from <b>{{senderName}}</b>.
</p>

<p>
<b>Total Amount:</b> ₹{{total}}
</p>

<p>
Please find the detailed invoice attached as PDF.
</p>

<hr/>

<p>
Regards,<br/>
<b>{{senderName}}</b><br/>
{{senderEmail}}
</p>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      color: #333;
    }

    .header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 30px;
    }

    .logo {
      font-size: 26px;
      font-weight: bold;
      color: #111;
    }

    .invoice-meta {
      text-align: right;
      font-size: 14px;
    }

    .section {
      margin-top: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
    }

    th {
      background: #f4f4f4;
      text-align: left;
    }

    .totals {
      width: 40%;
      margin-left: auto;
      margin-top: 30px;
    }

    .totals td {
      padding: 8px;
    }

    .grand {
      font-weight: bold;
      border-top: 2px solid #000;
    }

    .footer {
      margin-top: 50px;
      text-align: center;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>

  <div class="header">
    <div>
      <div class="logo">Billiant</div>
      <div>Invoice</div>
    </div>
    <div class="invoice-meta">
      <div><b>Invoice #</b> {{invoiceNumber}}</div>
      <div><b>Issue Date:</b> {{issueDate}}</div>
      <div><b>Due Date:</b> {{dueDate}}</div>
    </div>
  </div>

  <div class="section">
    <b>Billed To:</b><br/>
    {{clientName}}<br/>
    {{clientEmail}}
  </div>

  <table>
    <thead>
      <tr>
        <th>Description</th>
        <th>Qty</th>
        <th>Unit Price</th>
        <th>Amount</th>
      </tr>
    </thead>
    <tbody>
      {{items}}
    </tbody>
  </table>

  <table class="totals">
    <tr><td>Subtotal</td><td align="right">₹{{subtotal}}</td></tr>
    <tr><td>Tax ({{tax}}%)</td><td align="right">₹{{taxAmount}}</td></tr>
    <tr><td>Discount</td><td align="right">-₹{{discount}}</td></tr>
    <tr class="grand"><td>Total</td><td align="right">₹{{total}}</td></tr>
  </table>

  <div class="footer">
    Generated by Billiant
  </div>

</body>
</html>

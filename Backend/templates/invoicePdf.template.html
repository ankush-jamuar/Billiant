<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Invoice {{invoiceNumber}}</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      font-size: 14px;
      color: #333;
    }
    h1 {
      text-align: right;
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
    }
    th {
      background: #f4f4f4;
    }
    .totals {
      width: 40%;
      margin-left: auto;
      margin-top: 20px;
    }
    .totals td {
      border: none;
    }
  </style>
</head>

<body>
  <h1>INVOICE</h1>

  <p><strong>Invoice #:</strong> {{invoiceNumber}}</p>
  <p><strong>Client:</strong> {{clientName}}</p>
  <p><strong>Email:</strong> {{clientEmail}}</p>

  <table>
    <thead>
      <tr>
        <th>Description</th>
        <th>Qty</th>
        <th>Unit Price</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody>
      {{items}}
    </tbody>
  </table>

  <table class="totals">
    <tr>
      <td>Subtotal</td>
      <td style="text-align:right">₹{{subtotal}}</td>
    </tr>
    <tr>
      <td>Tax ({{taxPercent}}%)</td>
      <td style="text-align:right">₹{{taxAmount}}</td>
    </tr>
    <tr>
      <td>Discount</td>
      <td style="text-align:right">-₹{{discount}}</td>
    </tr>
    <tr>
      <td><strong>Total</strong></td>
      <td style="text-align:right"><strong>₹{{total}}</strong></td>
    </tr>
  </table>
</body>
</html>
